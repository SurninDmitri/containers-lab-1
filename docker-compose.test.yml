version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: myapp_test
    networks:
      - test-network

  app:
    images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.repo }}/app
    environment:
      DB_HOST: postgres
      DB_PASSWORD: secret
      DB_NAME: myapp_test
    depends_on:
      - postgres
    networks:
      - test-network

  nginx:
    images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.repo }}/nginx
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - test-network

networks:
  test-network: