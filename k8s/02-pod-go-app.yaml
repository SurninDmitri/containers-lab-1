apiVersion: v1
kind: Pod
metadata:
  name: go-app-pod
  labels:
    app: go-app
    lab: lab2
spec:
  imagePullSecrets:
    - name: ghcr-secret
  containers:
    - name: go-app
      image: ghcr.io/surnindmitri/containers-lab-1/app:latest
      imagePullPolicy: Always
      ports:
        - containerPort: 8080
      env:
        - name: DB_HOST
          value: "postgres-service"
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "secret"
        - name: DB_NAME
          value: "myapp"
      resources:
        requests:
          memory: "64Mi"
          cpu: "250m"
        limits:
          memory: "128Mi"
          cpu: "500m"
